# =============================================================================
# SentinelAI — ConfigMaps & Secret Templates
# Secrets values are base64 placeholders — populate via:
#   kubectl create secret generic ... --from-literal=...
#   OR use External Secrets Operator with AWS Secrets Manager
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-api-config
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: api
data:
  APP_ENV: "production"
  PORT: "8000"
  WORKERS: "4"
  LOG_LEVEL: "INFO"
  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-headless.sentinelai.svc.cluster.local:9092"
  KAFKA_TOPIC_AUDIO: "sentinel.audio.raw"
  KAFKA_TOPIC_VIDEO: "sentinel.video.raw"
  KAFKA_TOPIC_TEXT: "sentinel.text.raw"
  KAFKA_TOPIC_ALERTS: "sentinel.alerts"
  KAFKA_CONSUMER_GROUP: "sentinel-api"
  # Redis
  REDIS_HOST: "redis-master.sentinelai.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_CACHE_TTL: "300"
  # ML Service
  ML_INFERENCE_URL: "http://ml-inference.sentinelai.svc.cluster.local:8001"
  ML_REQUEST_TIMEOUT: "30"
  # JWT
  JWT_ALGORITHM: "RS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  # Rate limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  # Encryption
  ENCRYPTION_ALGORITHM: "AES-256-GCM"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-ml-config
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: ml-inference
data:
  APP_ENV: "production"
  PORT: "8001"
  LOG_LEVEL: "INFO"
  TRANSFORMERS_CACHE: "/opt/sentinelai/models"
  TORCH_HOME: "/opt/sentinelai/models"
  OMP_NUM_THREADS: "4"
  TOKENIZERS_PARALLELISM: "false"
  WHISPER_MODEL_SIZE: "base.en"
  VOICE_EMBEDDING_DIM: "192"
  MAX_AUDIO_SECONDS: "30"
  MAX_VIDEO_FRAMES: "64"
  BATCH_SIZE_AUDIO: "8"
  BATCH_SIZE_VIDEO: "4"
  BATCH_SIZE_TEXT: "16"
  # Pinecone / Milvus vector DB
  VECTOR_DB_PROVIDER: "pinecone"
  VECTOR_INDEX_VOICEPRINTS: "sentinel-voiceprints"
  VECTOR_TOP_K: "5"
  VECTOR_SIMILARITY_THRESHOLD: "0.92"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelai-router-config
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: stream-router
data:
  APP_ENV: "production"
  PORT: "9090"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-headless.sentinelai.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "sentinel-router"
  KAFKA_MAX_BYTES: "10485760"
  ROUTER_WORKERS: "8"
  WEBSOCKET_MAX_CONNECTIONS: "10000"
  WEBSOCKET_PING_INTERVAL: "20"
  WEBSOCKET_PING_TIMEOUT: "10"

---
# =============================================================================
# Secrets — TEMPLATE ONLY. Replace <base64-encoded-value> before applying.
# Production: use AWS Secrets Manager + External Secrets Operator
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sentinelai-api-secrets
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: api
type: Opaque
data:
  # echo -n "your-value" | base64
  DATABASE_URL: <base64-encoded-postgres-dsn>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  JWT_PRIVATE_KEY: <base64-encoded-rsa-private-key-pem>
  JWT_PUBLIC_KEY: <base64-encoded-rsa-public-key-pem>
  AES_MASTER_KEY: <base64-encoded-32-byte-aes-key>
  PINECONE_API_KEY: <base64-encoded-pinecone-key>
  PINECONE_ENVIRONMENT: <base64-encoded-pinecone-env>
  AWS_REGION: <base64-encoded-aws-region>

---
apiVersion: v1
kind: Secret
metadata:
  name: sentinelai-ml-secrets
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: ml-inference
type: Opaque
data:
  PINECONE_API_KEY: <base64-encoded-pinecone-key>
  PINECONE_ENVIRONMENT: <base64-encoded-pinecone-env>
  MILVUS_TOKEN: <base64-encoded-milvus-token>
  HF_HUB_TOKEN: <base64-encoded-hf-token>

---
# Image Pull Secret — ECR authentication (managed by AWS ECR Credential Helper in EKS)
apiVersion: v1
kind: Secret
metadata:
  name: ecr-pull-secret
  namespace: sentinelai
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
