# =============================================================================
# SentinelAI — ML Inference Service: Deployment, Service, PodDisruptionBudget
# GPU-optimised: targets nodes with nvidia.com/gpu label (g4dn/g5 EKS nodegroup)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-ml
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-ml
    app.kubernetes.io/component: ml-inference
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-ml
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinelai-ml
        app.kubernetes.io/component: ml-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sentinelai-ml
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120   # ML pods need longer drain time

      # Pin to GPU node group
      nodeSelector:
        node-role: gpu-workload
        nvidia.com/gpu.present: "true"

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: [sentinelai-ml]
                topologyKey: topology.kubernetes.io/zone

      initContainers:
        # Verify GPU device is accessible
        - name: gpu-check
          image: nvidia/cuda:12.1.1-base-ubuntu22.04
          command:
            - sh
            - -c
            - |
              nvidia-smi && echo "GPU check passed" || (echo "GPU not available"; exit 1)
          resources:
            limits:
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534

      containers:
        - name: ml-inference
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/sentinelai/ml:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
              protocol: TCP

          envFrom:
            - configMapRef:
                name: sentinelai-ml-config
            - secretRef:
                name: sentinelai-ml-secrets

          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8001
            initialDelaySeconds: 60        # Model loading takes time
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8001
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5

          startupProbe:
            httpGet:
              path: /health/live
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18           # 3-minute startup budget for model load

          volumeMounts:
            - name: tmp-dir
              mountPath: /app/tmp
            - name: logs-dir
              mountPath: /app/logs
            - name: audio-scratch
              mountPath: /app/audio_scratch
            - name: model-cache
              mountPath: /opt/sentinelai/models
              readOnly: true

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: "512Mi"
        - name: logs-dir
          emptyDir:
            sizeLimit: "2Gi"
        - name: audio-scratch
          emptyDir:
            sizeLimit: "2Gi"
        # Model weights baked into image; mount as read-only overlay
        # For production: use a PVC backed by EFS or a pre-populated init container
        - name: model-cache
          emptyDir:
            sizeLimit: "20Gi"

      imagePullSecrets:
        - name: ecr-pull-secret

---
apiVersion: v1
kind: Service
metadata:
  name: ml-inference
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-ml
    app.kubernetes.io/component: ml-inference
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentinelai-ml
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinelai-ml-pdb
  namespace: sentinelai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-ml
