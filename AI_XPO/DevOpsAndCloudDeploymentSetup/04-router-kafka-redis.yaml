# =============================================================================
# SentinelAI — Go Stream Router Deployment
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-router
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-router
    app.kubernetes.io/component: stream-router
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinelai-router
        app.kubernetes.io/component: stream-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sentinelai-router
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [sentinelai-router]
              topologyKey: topology.kubernetes.io/zone

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sentinelai-router

      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-headless.sentinelai.svc.cluster.local 9092; do
                echo "Waiting for Kafka..."; sleep 3;
              done
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true

      containers:
        - name: stream-router
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/sentinelai/router:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
              name: grpc-ws
              protocol: TCP

          envFrom:
            - configMapRef:
                name: sentinelai-router-config

          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]

      imagePullSecrets:
        - name: ecr-pull-secret

---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-router
  namespace: sentinelai
  labels:
    app.kubernetes.io/component: stream-router
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentinelai-router
  ports:
    - name: grpc-ws
      port: 9090
      targetPort: 9090

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinelai-router-pdb
  namespace: sentinelai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-router

---
# =============================================================================
# Apache Kafka — StatefulSet (3-broker cluster, 3-AZ HA)
# Production: prefer Confluent Operator or Strimzi Kafka Operator
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: kafka
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [kafka]
              topologyKey: topology.kubernetes.io/zone

      containers:
        - name: kafka
          image: bitnami/kafka:3.6.1
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_CFG_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(MY_POD_NAME).kafka-headless.sentinelai.svc.cluster.local:9092"
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_CFG_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_CFG_NUM_PARTITIONS
              value: "12"
            - name: KAFKA_CFG_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_CFG_LOG_SEGMENT_BYTES
              value: "536870912"   # 512 MB
            - name: KAFKA_CFG_MESSAGE_MAX_BYTES
              value: "10485760"    # 10 MB
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: kafka
spec:
  type: ClusterIP
  clusterIP: None    # Headless for StatefulSet DNS
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093

---
# =============================================================================
# Redis — Master/Replica with Sentinel for HA
# Production: prefer Redis Operator or AWS ElastiCache
# =============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis
    role: master
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      role: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: redis
        role: master
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinelai-api-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
      volumes:
        - name: redis-config
          configMap:
            name: redis-config

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: sentinelai
data:
  redis.conf: |
    maxmemory 1536mb
    maxmemory-policy allkeys-lru
    requirepass ${REDIS_PASSWORD}
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    save 900 1
    save 300 10
    save 60 10000
    tcp-keepalive 300
    timeout 0
    loglevel notice
    # TLS disabled within cluster mesh; handled by mTLS (Istio/Linkerd)
    protected-mode yes
    bind 0.0.0.0

---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: redis
    role: master
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
