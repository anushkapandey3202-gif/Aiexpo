# =============================================================================
# SentinelAI — FastAPI Gateway: Deployment, Service, PodDisruptionBudget
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-api
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-api
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deployments
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinelai-api
        app.kubernetes.io/component: api
      annotations:
        # Force pod restart on config/secret change (checksum-based)
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sentinelai-api
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60

      # Pod Anti-Affinity — spread replicas across AZs
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [sentinelai-api]
              topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role
                    operator: In
                    values: [api-workload]

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sentinelai-api

      initContainers:
        # Wait for PostgreSQL to be ready before starting
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
          env:
            - name: DB_HOST
              value: "postgres.sentinelai.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true

      containers:
        - name: api
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/sentinelai/api:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          envFrom:
            - configMapRef:
                name: sentinelai-api-config
            - secretRef:
                name: sentinelai-api-secrets

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12          # 60s total startup budget

          volumeMounts:
            - name: tmp-dir
              mountPath: /app/tmp
            - name: logs-dir
              mountPath: /app/logs

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]

          lifecycle:
            preStop:
              exec:
                # Graceful drain: wait for in-flight requests
                command: ["/bin/sh", "-c", "sleep 10"]

      volumes:
        - name: tmp-dir
          emptyDir:
            medium: Memory
            sizeLimit: "128Mi"
        - name: logs-dir
          emptyDir:
            sizeLimit: "1Gi"

      imagePullSecrets:
        - name: ecr-pull-secret

---
# ClusterIP Service — internal mesh communication
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-api
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentinelai-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  sessionAffinity: None

---
# LoadBalancer Service — external ingress (or use Ingress + AWS ALB Ingress Controller)
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-api-external
  namespace: sentinelai
  labels:
    app.kubernetes.io/name: sentinelai-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health/live"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:REGION:ACCOUNT_ID:certificate/CERT_ID"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: sentinelai-api
  ports:
    - name: https
      port: 443
      targetPort: 8000
      protocol: TCP

---
# PodDisruptionBudget — ensure at least 2 replicas during node drain
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinelai-api-pdb
  namespace: sentinelai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelai-api
